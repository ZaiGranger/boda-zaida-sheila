# Despliegue automático en Render cuando exista el servicio
# Configura estos secrets en GitHub: Settings → Secrets → Actions
#   RENDER_API_KEY  → https://dashboard.render.com/u/settings#api-keys
#   RENDER_SERVICE_ID → ID del servicio en Render

name: Deploy to Render

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: |
          curl -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}'
