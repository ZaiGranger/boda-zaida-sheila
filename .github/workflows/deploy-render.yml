# Despliegue en Render al hacer push a main
# Secret requerido: RENDER_DEPLOY_HOOK (URL del Deploy Hook de Render)

name: Deploy to Render

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        run: curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
